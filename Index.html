// =============================================================
// localStorage shim that mimics Claude.ai's window.storage API.
// Same async signature so the original app code is untouched.
// =============================================================
window.storage = {
  async get(key) {
    try {
      const value = localStorage.getItem(key);
      return value === null ? null : { value };
    } catch (e) {
      console.error("storage.get failed:", e);
      return null;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      console.error("storage.set failed:", e);
      return false;
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return true;
    } catch (e) {
      console.error("storage.delete failed:", e);
      return false;
    }
  },
};

// --- Helpers ---
function getWeekId(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diff = d.getDate() - day;
  const sunday = new Date(d.setDate(diff));
  return sunday.toISOString().slice(0, 10);
}

function weightedRandomSelect(entries, count) {
  const pool = entries.filter((e) => e.weight > 0);
  const selected = [];
  const usedIds = new Set();

  for (let i = 0; i < count && pool.length > 0; i++) {
    const totalWeight = pool.reduce((sum, e) => sum + e.weight, 0);
    if (totalWeight <= 0) break;
    let rand = Math.random() * totalWeight;
    let chosen = null;
    for (const entry of pool) {
      rand -= entry.weight;
      if (rand <= 0) {
        chosen = entry;
        break;
      }
    }
    if (chosen && !usedIds.has(chosen.id)) {
      selected.push(chosen.id);
      usedIds.add(chosen.id);
      pool.splice(pool.indexOf(chosen), 1);
    }
  }
  return selected;
}

  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

// --- Components ---
function UndoToast({ message, onUndo, onDismiss }) {
  const [fading, setFading] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    timerRef.current = setTimeout(() => {
      setFading(true);
      setTimeout(onDismiss, 300);
    }, UNDO_TIMEOUT);
    return () => clearTimeout(timerRef.current);
  }, [onDismiss]);

  const handleUndo = () => {
    clearTimeout(timerRef.current);
    onUndo();
  };

  return (
    <div
      style={{
        ...styles.undoToast,
        ...(fading ? { animation: "fadeOut 0.3s ease-out forwards" } : {}),
      }}
    >
      <span style={styles.undoText}>{message}</span>
      <button
        style={styles.undoBtn}
        onClick={handleUndo}
        onMouseEnter={(e) => (e.target.style.background = "#1a3a5c")}
        onMouseLeave={(e) => (e.target.style.background = "transparent")}
      >
        undo
      </button>
    </div>
  );
}

function LibraryEntry({ entry, onDelete, onEdit, onAddToWeek, onResetWeight, isInWeek }) {
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(entry.text);
  const [editAuthor, setEditAuthor] = useState(entry.author || "");
  const [editSource, setEditSource] = useState(entry.source || "");
  const [confirmDelete, setConfirmDelete] = useState(false);

  const handleSave = () => {
    if (editText.trim() && editText.length <= MAX_CHARS) {
      onEdit(entry.id, editText.trim(), editAuthor.trim(), editSource.trim());
      setEditing(false);
    }
  };

  const handleCancel = () => {
    setEditText(entry.text);
    setEditAuthor(entry.author || "");
    setEditSource(entry.source || "");
    setEditing(false);
  };

  const weightColor =
    entry.weight >= 7 ? "#6cb4ee" : entry.weight >= 4 ? "#f0b232" : entry.weight > 0 ? "#e07850" : "#e05252";

  return (
    <div>
      <div style={styles.libraryEntry}>
        <div style={{ flex: 1 }}>
          {editing ? (
            <div>
              <textarea
                style={styles.editTextarea}
                value={editText}
                onChange={(e) => setEditText(e.target.value)}
                maxLength={MAX_CHARS}
              />
              <input
                style={{
                  width: "100%",
                  padding: "6px 10px",
                  border: "1px solid #2a2d38",
                  borderRadius: 5,
                  background: "#0d0e14",
                  color: "#c8ccd4",
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: 11,
                  fontWeight: 400,
                  outline: "none",
                  boxSizing: "border-box",
                  marginTop: 6,
                }}
                placeholder="Author (optional)"
                value={editAuthor}
                onChange={(e) => setEditAuthor(e.target.value.slice(0, 50))}
                maxLength={50}
              />
              <input
                style={{
                  width: "100%",
                  padding: "6px 10px",
                  border: "1px solid #2a2d38",
                  borderRadius: 5,
                  background: "#0d0e14",
                  color: "#c8ccd4",
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: 11,
                  fontWeight: 400,
                  fontStyle: "italic",
                  outline: "none",
                  boxSizing: "border-box",
                  marginTop: 4,
                }}
                placeholder="Source (optional)"
                value={editSource}
                onChange={(e) => setEditSource(e.target.value.slice(0, 100))}
                maxLength={100}
              />
              <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                <button style={styles.smallBtn("#6cb4ee")} onClick={handleSave}>
                  save
                </button>
                <button style={styles.smallBtn("#5a6270")} onClick={handleCancel}>
                  cancel
                </button>
              </div>
            </div>
          ) : (
            <div style={styles.libraryText}>
              {entry.text}
              {(entry.author || entry.source) && (
                <span style={{ display: "block", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#5a6270", marginTop: 4 }}>
                  {entry.author && `— ${entry.author}`}{entry.author && entry.source && ", "}{entry.source && <span style={{ fontStyle: "italic", color: "#4a5060" }}>{entry.source}</span>}
                </span>
              )}
            </div>
          )}
        </div>
        <div style={styles.libraryWeight}>
          <span style={{ color: weightColor }}>{entry.weight.toFixed(1)}</span>
        </div>
        <div style={styles.libraryActions}>
          {!editing && (
            <>
              <button
                style={styles.smallBtn("#3ddc84")}
                onClick={() => onAddToWeek(entry.id)}

              {entry.weight < 10 && (

                  style={styles.smallBtn("#f0b232")}

              <button style={styles.smallBtn("#e05252")} onClick={() => setConfirmDelete(true)}>

// Subtle reset-all-data control. Two-step confirm to avoid fat-finger wipes.
function ResetAllButton({ onReset }) {
  const [armed, setArmed] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (armed) {
      timerRef.current = setTimeout(() => setArmed(false), 5000);
      return () => clearTimeout(timerRef.current);
    }
  }, [armed]);

  if (!armed) {
    return (
      <button
        style={styles.resetLink}
        onMouseEnter={(e) => (e.target.style.color = "#5a6270")}
        onMouseLeave={(e) => (e.target.style.color = "#2a2d38")}
        onClick={() => setArmed(true)}
        title="Reset all data — wipes your vault"
      >
        reset
      </button>
    );
  }
  return (
    <button
      style={{ ...styles.resetLink, color: "#e05252" }}
      onClick={() => {
        clearTimeout(timerRef.current);
        onReset();
        setArmed(false);
      }}
    >
      tap again to wipe
    </button>
  );
}

// --- Main App ---
function InsightVault() {
  const [data, setData] = useState(null);
  const [view, setView] = useState("weekly");
  const [newText, setNewText] = useState("");
  const [newAuthor, setNewAuthor] = useState("");
  const [newSource, setNewSource] = useState("");
  const [loading, setLoading] = useState(true);
  const [undoState, setUndoState] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          // Migration: backfill author/source fields if missing
          let needsSave = false;
          const seedEntries = createSeedData().entries;
          parsed.entries = parsed.entries.map((entry) => {
            if (entry.author === undefined || entry.source === undefined) {
              needsSave = true;
              const seedMatch = seedEntries.find((s) => s.text === entry.text);
              return {
                ...entry,
                author: entry.author !== undefined ? entry.author : (seedMatch ? seedMatch.author : ""),
                source: entry.source !== undefined ? entry.source : (seedMatch ? seedMatch.source : ""),
              };
            }
            return entry;
          });
          // Add any new seed entries not present in stored data
          const existingTexts = new Set(parsed.entries.map((e) => e.text));
          for (const seed of seedEntries) {
            if (!existingTexts.has(seed.text)) {
              parsed.entries.push(seed);
              needsSave = true;
            }
          }
          setData(parsed);
          if (needsSave) {
            await window.storage.set(STORAGE_KEY, JSON.stringify(parsed));
          }
        } else {
          setData(createSeedData());
        }
      } catch {
        setData(createSeedData());
      }
      setLoading(false);
    }
    load();
  }, []);

  const saveData = useCallback(async (newData) => {
    setData(newData);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(newData));
    } catch (e) {
      console.error("Storage save failed:", e);
    }
  }, []);

  const saveWithUndo = useCallback(
    (newData, message) => {
      const snapshot = JSON.parse(JSON.stringify(data));
      setUndoState({ message, snapshot });
      saveData(newData);
    },
    [data, saveData]
  );

  const handleUndo = useCallback(() => {
    if (undoState && undoState.snapshot) {
      saveData(undoState.snapshot);
      setUndoState(null);
    }
  }, [undoState, saveData]);

  const dismissUndo = useCallback(() => {
    setUndoState(null);
  }, []);

  const handleResetAll = useCallback(async () => {
    await window.storage.delete(STORAGE_KEY);
    const fresh = createSeedData();
    setData(fresh);
    await window.storage.set(STORAGE_KEY, JSON.stringify(fresh));
  }, []);

  // Weekly rotation
  useEffect(() => {
    if (!data) return;
    const currentWeekId = getWeekId();
    if (data.currentWeekId !== currentWeekId) {
      const updated = { ...data, entries: data.entries.map((e) => ({ ...e })) };
      if (data.currentWeekId) {
        const prevSelected = new Set(data.weeklySelections || []);
        updated.entries = updated.entries.map((entry) => {
          let w = entry.weight;
          if (prevSelected.has(entry.id) && !entry.skippedThisWeek && !entry.absorbedThisWeek) {
            w -= 3;
          }
          if (!prevSelected.has(entry.id) && !entry.addedThisWeek) {
            w += 0.5;
          }
          w = Math.max(0, Math.min(10, w));
          return { ...entry, weight: w, skippedThisWeek: false, absorbedThisWeek: false, addedThisWeek: false };
        });
      }
      updated.weeklySelections = weightedRandomSelect(updated.entries, 3);
      updated.currentWeekId = currentWeekId;
      saveData(updated);
    }
  }, [data, saveData]);

  const handleSkip = (entryId) => {
    if (!data) return;
    const entry = data.entries.find((e) => e.id === entryId);
    const updated = {
      ...data,
      entries: data.entries.map((e) =>
        e.id === entryId ? { ...e, weight: Math.max(0, e.weight - 1.5), skippedThisWeek: true } : e
      ),
    };
    const remainingPool = updated.entries.filter(
      (e) => e.weight > 0 && !updated.weeklySelections.includes(e.id)
    );
    const replacement = weightedRandomSelect(remainingPool, 1);
    updated.weeklySelections = updated.weeklySelections.map((id) =>
      id === entryId ? (replacement[0] || id) : id
    );
    if (!replacement[0]) {
      updated.weeklySelections = updated.weeklySelections.filter((id) => id !== entryId);
    }
    const preview = entry ? entry.text.slice(0, 40) + (entry.text.length > 40 ? "..." : "") : "entry";
    saveWithUndo(updated, `Skipped "${preview}"`);
  };

  const handleAbsorb = (entryId) => {
    if (!data) return;
    const entry = data.entries.find((e) => e.id === entryId);
    const updated = {
      ...data,
      entries: data.entries.map((e) =>
        e.id === entryId ? { ...e, weight: Math.max(0, e.weight - 5), absorbedThisWeek: true } : e
      ),
    };
    updated.weeklySelections = updated.weeklySelections.filter((id) => id !== entryId);
    const preview = entry ? entry.text.slice(0, 40) + (entry.text.length > 40 ? "..." : "") : "entry";
    saveWithUndo(updated, `Absorbed "${preview}"`);
  };

  const handleAddToWeek = () => {
    if (!newText.trim() || newText.length > MAX_CHARS) return;
    const newEntry = {
      id: generateId(),
      text: newText.trim(),
      author: newAuthor.trim(),
      source: newSource.trim(),
      weight: 10,
      createdAt: Date.now(),
      addedThisWeek: true,
    };
    saveData({
      ...data,
      entries: [...data.entries, newEntry],
      weeklySelections: [...data.weeklySelections, newEntry.id],
    });
    setNewText("");
    setNewAuthor("");
    setNewSource("");
  };

  const handleAddToLibrary = () => {
    if (!newText.trim() || newText.length > MAX_CHARS) return;
    const newEntry = {
      id: generateId(),
      text: newText.trim(),
      author: newAuthor.trim(),
      source: newSource.trim(),
      weight: 10,
      createdAt: Date.now(),
    };
    saveData({ ...data, entries: [...data.entries, newEntry] });
    setNewText("");
    setNewAuthor("");
    setNewSource("");
  };

  const handleAddExistingToWeek = (entryId) => {
    if (!data) return;
    const filtered = data.weeklySelections.filter((id) => id !== entryId);
    saveData({ ...data, weeklySelections: [...filtered, entryId] });
  };

  const handleResetWeight = (entryId) => {
    if (!data) return;
    saveData({
      ...data,
      entries: data.entries.map((e) => (e.id === entryId ? { ...e, weight: 10 } : e)),
    });
  };

  const handleDelete = (entryId) => {
    saveData({
      ...data,
      entries: data.entries.filter((e) => e.id !== entryId),
      weeklySelections: data.weeklySelections.filter((id) => id !== entryId),
    });
  };

  const handleEdit = (entryId, newTextVal, newAuthorVal, newSourceVal) => {
    saveData({
      ...data,
      entries: data.entries.map((e) => (e.id === entryId ? { ...e, text: newTextVal, author: newAuthorVal, source: newSourceVal } : e)),
    });
  };

  if (loading || !data) {
    return (
      <div style={styles.app}>
        <div style={styles.content}>
          <p style={{ color: "#3d4350", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>loading...</p>
        </div>
      </div>
    );
  }

  const weeklyEntries = data.weeklySelections.map((id) => data.entries.find((e) => e.id === id)).filter(Boolean);
  const weeklyIdSet = new Set(data.weeklySelections);
  const sortedLibrary = [...data.entries].sort((a, b) => b.weight - a.weight);
  const nextSunday = new Date();
  const daysUntilSunday = (7 - nextSunday.getDay()) % 7 || 7;

  return (
    <div style={styles.app}>
      <style>{animationCSS}</style>
      <div style={styles.grain} />
      <div style={styles.content}>
        <div style={styles.header}>
          <h1 style={styles.title}>Insight Vault</h1>
          <p style={styles.subtitle}>{data.entries.length} entries · rotates every Sunday</p>
        </div>

        <div style={styles.nav}>
          <button style={styles.navButton(view === "weekly")} onClick={() => setView("weekly")}>
            This Week
          </button>
          <button style={styles.navButton(view === "library")} onClick={() => setView("library")}>
            Library
          </button>
        </div>

        {view === "weekly" && (
          <div style={{ marginTop: 32 }}>
            <div style={styles.weekInfo}>
              <span style={styles.weekLabel}>Week of {data.currentWeekId}</span>
              <span style={styles.weekLabel}>
                {daysUntilSunday === 7 ? "rotates today" : `${daysUntilSunday}d until rotation`}
              </span>
            </div>
            {weeklyEntries.length === 0 ? (
              <div style={styles.emptyState}>
                <div style={styles.emptyTitle}>Nothing this week</div>
                <p style={{ fontSize: 14 }}>
                  All entries are cooling down, or the library is empty. Add some from the Library tab.
                </p>
              </div>
            ) : (
              weeklyEntries.map((entry) => (
                <WeeklyCard
                  key={entry.id}
                  entry={entry}
                  onSkip={handleSkip}
                  onAbsorb={handleAbsorb}
                  isAddedThisWeek={entry.addedThisWeek}
                />
              ))
            )}
          </div>
        )}

        {view === "library" && (
          <div style={{ marginTop: 32 }}>
            <div style={styles.addSection}>
              <label style={styles.addLabel}>Add new insight</label>
              <textarea
                style={styles.textarea}
                placeholder="Something worth remembering..."
                value={newText}
                onChange={(e) => setNewText(e.target.value)}
                maxLength={MAX_CHARS}
                onFocus={(e) => (e.target.style.borderColor = "#2a3a5c")}
                onBlur={(e) => (e.target.style.borderColor = "#1e2028")}
              />
              <div style={styles.charCount(newText.length > MAX_CHARS)}>{newText.length}/{MAX_CHARS}</div>
              <input
                style={{
                  width: "100%",
                  padding: "10px 16px",
                  border: "1px solid #1e2028",
                  borderRadius: 8,
                  background: "#0d0e14",
                  color: "#c8ccd4",
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: 13,
                  fontWeight: 400,
                  outline: "none",
                  boxSizing: "border-box",
                  marginTop: 10,
                  transition: "border-color 0.2s ease",
                }}
                placeholder="Author (optional)"
                value={newAuthor}
                onChange={(e) => setNewAuthor(e.target.value.slice(0, 50))}
                maxLength={50}
                onFocus={(e) => (e.target.style.borderColor = "#2a3a5c")}
                onBlur={(e) => (e.target.style.borderColor = "#1e2028")}
              />
              <input
                style={{
                  width: "100%",
                  padding: "10px 16px",
                  border: "1px solid #1e2028",
                  borderRadius: 8,
                  background: "#0d0e14",
                  color: "#c8ccd4",
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: 13,
                  fontWeight: 400,
                  fontStyle: "italic",
                  outline: "none",
                  boxSizing: "border-box",
                  marginTop: 6,
                  transition: "border-color 0.2s ease",
                }}
                placeholder="Source (optional) e.g. Atomic Habits, 2018"
                value={newSource}
                onChange={(e) => setNewSource(e.target.value.slice(0, 100))}
                maxLength={100}
                onFocus={(e) => (e.target.style.borderColor = "#2a3a5c")}
                onBlur={(e) => (e.target.style.borderColor = "#1e2028")}
              />
              {newText.trim() && (
                <div style={styles.addButtons}>
                  <button style={styles.addBtn(true)} onClick={handleAddToWeek}>add to this week</button>
                  <button style={styles.addBtn(false)} onClick={handleAddToLibrary}>add to library</button>
                </div>
              )}
            </div>

            <div style={{ marginTop: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, padding: "0 4px" }}>
                <span style={styles.weekLabel}>{data.entries.length} entries</span>
                <span style={styles.weekLabel}>weight</span>
              </div>
              {sortedLibrary.map((entry) => (
                <LibraryEntry
                  key={entry.id}
                  entry={entry}
                  onDelete={handleDelete}
                  onEdit={handleEdit}
                  onAddToWeek={handleAddExistingToWeek}
                  onResetWeight={handleResetWeight}
                  isInWeek={weeklyIdSet.has(entry.id)}
                />
              ))}
            </div>
          </div>
        )}
      </div>

      {undoState && (
        <UndoToast
          key={undoState.message}
          message={undoState.message}
          onUndo={handleUndo}
          onDismiss={dismissUndo}
        />
      )}

      <ResetAllButton onReset={handleResetAll} />
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InsightVault />);
</script>
</body>
</html>
